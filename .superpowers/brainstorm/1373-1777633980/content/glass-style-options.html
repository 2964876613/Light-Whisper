<h2>选择你要的"现代高级感"细分方向</h2>
<p class="subtitle">同属 iOS 玻璃拟态，但气质不同。先选整体风格，再落到具体页面。</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-header">A · Frosted Minimal</div>
        <div class="mockup-body" style="background: linear-gradient(135deg,#f5f7fb,#e6edf8); padding:12px; border-radius:12px;">
          <div style="height:38px;border-radius:12px;background:rgba(255,255,255,.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.7);"></div>
          <div style="display:flex;gap:10px;margin-top:10px;">
            <div style="flex:1;height:72px;border-radius:14px;background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.75);"></div>
            <div style="flex:1;height:72px;border-radius:14px;background:rgba(255,255,255,.42);border:1px solid rgba(255,255,255,.7);"></div>
          </div>
          <div style="height:14px;width:64%;margin-top:10px;background:rgba(38,62,94,.25);border-radius:7px;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 轻盈冷白</h3>
      <p>高级、克制、干净，最像 Apple 官方产品页审美。</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-header">B · Aurora Glass</div>
        <div class="mockup-body" style="background: radial-gradient(circle at 20% 20%,#9dc7ff 0,#6f8cff 40%,#8b6dff 75%,#4c4f96 100%); padding:12px; border-radius:12px;">
          <div style="height:38px;border-radius:12px;background:rgba(255,255,255,.2);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.38);"></div>
          <div style="display:flex;gap:10px;margin-top:10px;">
            <div style="flex:1;height:72px;border-radius:14px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);"></div>
            <div style="flex:1;height:72px;border-radius:14px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.32);"></div>
          </div>
          <div style="height:14px;width:64%;margin-top:10px;background:rgba(255,255,255,.35);border-radius:7px;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 极光炫彩</h3>
      <p>更有记忆点和品牌感，视觉冲击更强。</p>
    </div>
  </div>

  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-header">C · Dark Titanium Glass</div>
        <div class="mockup-body" style="background: linear-gradient(140deg,#161a24,#283347 45%,#1f2433); padding:12px; border-radius:12px;">
          <div style="height:38px;border-radius:12px;background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.18);"></div>
          <div style="display:flex;gap:10px;margin-top:10px;">
            <div style="flex:1;height:72px;border-radius:14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);"></div>
            <div style="flex:1;height:72px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);"></div>
          </div>
          <div style="height:14px;width:64%;margin-top:10px;background:rgba(255,255,255,.26);border-radius:7px;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>C. 深钛夜色</h3>
      <p>质感最强、最"专业工具"，但对可读性要求更高。</p>
    </div>
  </div>
</div>
